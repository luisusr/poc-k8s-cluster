apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wazuh-manager
  namespace: security
spec:
  podSelector:
    matchLabels:
      app: wazuh-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Wazuh agents - event forwarding (TCP/UDP syslog)
    - ports:
        - protocol: TCP
          port: 1514
        - protocol: UDP
          port: 1514
    # Wazuh agents - enrollment and registration
    - ports:
        - protocol: TCP
          port: 1515
    # Wazuh cluster daemon (manager-to-manager)
    - from:
        - podSelector:
            matchLabels:
              app: wazuh-manager
      ports:
        - protocol: TCP
          port: 1516
    # Wazuh REST API (Dashboard and external consumers)
    - from:
        - podSelector:
            matchLabels:
              app: wazuh-dashboard
      ports:
        - protocol: TCP
          port: 55000
  egress:
    # Wazuh Indexer (event indexing and querying)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wazuh-indexer
      ports:
        - protocol: TCP
          port: 9200
    # Wazuh cluster daemon (inter-manager)
    - to:
        - podSelector:
            matchLabels:
              app: wazuh-manager
      ports:
        - protocol: TCP
          port: 1516
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # AWS APIs (Secrets Manager via ExternalSecret, metadata)
    - to: []
      ports:
        - protocol: TCP
          port: 443
